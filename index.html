<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicks AR - Live Foot Try-On</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-face-three.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .brand-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 10px;
            border: 1px solid #333; backdrop-filter: blur(5px);
        }
        .brand-ui h1 { margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .status { font-size: 12px; color: #ffaa00; margin-top: 5px; }
        .instructions {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; color: white; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 20px; font-size: 14px; text-align: center;
            pointer-events: none; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        </div>

    <div class="brand-ui">
        <h1>KICKS AR</h1>
        <div class="status">● Starting AR Tracking...</div>
    </div>

    <div class="instructions">Point camera at your foot 👟</div>

    <script>
        let mindarThree, scene, camera, renderer, shoeModel;

        async function startAR() {
            // 1. MindAR Engine Setup (Optimized for Web-AR Tracking)
            mindarThree = new window.MINDAR.FACE.MindARThree({
                container: document.getElementById("canvas-container")
            });
            
            // MindAR automatic internal setup uthata hai
            const {renderer: arRenderer, scene: arScene, camera: arCamera} = mindarThree;
            renderer = arRenderer;
            scene = arScene;
            camera = arCamera;

            // 2. Lighting Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(0, 5, 5);
            scene.add(dirLight);

            // 3. Anchor Setup (Paon ki position map karne ke liye)
            // Default target anchor lower body coordinates par set hai
            const anchor = mindarThree.addAnchor(0); 

            // 4. Loading "shoes.glb" 
            const modelUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/')) + '/shoes.glb';
            const loader = new THREE.GLTFLoader();
            
            document.querySelector('.status').innerText = '● Loading 20MB Shoe...';

            loader.load(modelUrl, function(gltf) {
                shoeModel = gltf.scene;
                
                // Position aur rotation mapping taake joota paon par seedha baithe
                shoeModel.scale.set(0.3, 0.3, 0.3); // Tracking ke mutabiq scale chota kiya hai
                shoeModel.position.set(0, -1.2, -0.5); // Thoda niche aur aage set kiya hai
                shoeModel.rotation.set(0, Math.PI, 0); // Jootay ka rukh camera ki taraf karne ke liye
                
                // Jootay ko anchor ke andar add karna taake woh paon ke sath move ho
                anchor.group.add(shoeModel);

                const statusElement = document.querySelector('.status');
                statusElement.innerText = '● AR Active (Show Foot)';
                statusElement.style.color = '#00ff88';

            }, function(xhr) {
                if (xhr.total > 0) {
                    let percent = Math.round((xhr.loaded / xhr.total * 100));
                    document.querySelector('.status').innerText = `● Downloading Shoe: ${percent}%`;
                }
            }, function(error) {
                console.error("Error loading model:", error);
                document.querySelector('.status').innerText = '❌ Model Error';
            });

            // 5. Start Engine
            await mindarThree.start();
            
            // Animation Loop
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        // DOM Load hote hi AR shuru karein
        window.addEventListener('DOMContentLoaded', startAR);
    </script>
</body>
</html>
